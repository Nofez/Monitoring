groups:
  - name: node-exporter
    rules:
      - alert: HighCPULoad
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          service: node-exporter
        annotations:
          summary: "Высокая загрузка CPU на {{ $labels.instance }}"
          description: "CPU load {{ $value | printf \"%.2f\" }}% за последние 5 минут"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
          service: node_exporter
        annotations:
          summary: "Критическое использование памяти на {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 < 10
        for: 10m
        labels:
          severity: warning
          service: node_exporter
        annotations:
          summary: "Мало места на диске {{ $labels.mountpoint }} ({{ $labels.instance }})"