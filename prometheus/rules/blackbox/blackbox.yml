groups:
  - name: blackbox
    rules:
      - alert: WebsiteDown
        expr: probe_success{job="blackbox"} == 0
        for: 2m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "Сайт недоступен: {{ $labels.instance }}"
          description: "Blackbox probe fails для {{ $labels.instance }} более 2 минут"

      - alert: BlackboxHighLatency
        expr: probe_duration_seconds > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Долгий ответ от {{ $labels.instance }}"
          description: "Проба {{ $labels.instance }} отвечает дольше 2 секунд уже 5 минут (текущее значение: {{ $value }}s)."