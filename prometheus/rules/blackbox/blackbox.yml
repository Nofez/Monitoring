groups:
  - name: blackbox
    rules:
      - alert: WebsiteDown
        expr: probe_success{job="blackbox"} == 0
        for: 1m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "Сайт недоступен: {{ $labels.instance }}"
          description: "Blackbox probe fails для {{ $labels.instance }} более 2 минут"