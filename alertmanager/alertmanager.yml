global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      continue: true

receivers:
  - name: "default"
    telegram_configs:
      - bot_token: "6697307009:AAHSddZAdYiz7yYyADUXZ7oi-HvQNibLTI4"
        chat_id: -5421897133
        parse_mode: "HTML"

  - name: "critical-alerts"
    telegram_configs:
      - bot_token: "6697307009:AAHSddZAdYiz7yYyADUXZ7oi-HvQNibLTI4"
        chat_id: -5421897133
        parse_mode: "HTML"


inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]